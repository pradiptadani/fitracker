name: CI

# Validate code on every push and PR. Does NOT deploy.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]   # main pushes are handled by CD (post-merge)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx vitest run --reporter=verbose tests/unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test]
    env:
      DATABASE_URL: postgresql://fitracker:ci@localhost:5432/fitracker
      IRON_SESSION_SECRET: ci-test-secret-at-least-32-characters-long-ok
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
