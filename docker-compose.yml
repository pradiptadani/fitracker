services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitracker
      POSTGRES_USER: ${POSTGRES_USER:-fitracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitracker_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"

  app:
    build: .
    env_file: .env
    ports:
      - "3015:3000"
    depends_on:
      - db

volumes:
  pgdata:
